<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Деберц Клуб</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; overflow: hidden; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gradient-to-b from-[#112211] to-[#071107] text-white font-sans min-h-screen flex flex-col justify-between p-4">

    <!-- ================= ЭКРАН 1: ГЛАВНОЕ МЕНЮ ================= -->
    <div id="menu-screen" class="flex flex-col justify-between h-full flex-grow">
        <!-- Профиль -->
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center justify-between backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center font-bold text-lg text-slate-900 border-2 border-amber-400">М</div>
                <div>
                    <h2 id="username" class="font-bold text-lg leading-tight">Игрок</h2>
                    <p class="text-xs text-gray-400">Рейтинг: <span class="text-amber-400 font-semibold">1250 🏆</span></p>
                </div>
            </div>
            <div class="text-right text-xs text-gray-400 bg-black/20 px-3 py-1.5 rounded-xl">
                <div>Побед: <span class="text-green-400 font-bold">42</span></div>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="flex flex-col gap-4 my-auto w-full max-w-sm mx-auto">
            <button onclick="startGame()" class="w-full bg-gradient-to-r from-emerald-500 to-green-600 active:scale-[0.98] transition-all py-4 rounded-2xl font-bold text-lg border-b-4 border-green-700 shadow-lg">
                🃏 Быстрая игра
            </button>
            <button class="w-full bg-gradient-to-r from-amber-500 to-orange-600 active:scale-[0.98] transition-all py-4 rounded-2xl font-bold text-lg border-b-4 border-orange-700 shadow-lg">
                👥 Играть с другом
            </button>
        </div>

        <!-- Футтер -->
        <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto w-full">
            <button class="bg-slate-800/60 py-3 rounded-xl font-medium text-sm">🏆 Лидеры</button>
            <button class="bg-slate-800/60 py-3 rounded-xl font-medium text-sm">📜 Правила</button>
        </div>
    </div>


    <!-- ================= ЭКРАН 2: ИГРОВОЙ СТОЛ ================= -->
    <div id="game-screen" class="hidden flex flex-col justify-between h-full flex-grow relative">
        
        <!-- Верх: Соперник -->
        <div class="flex items-center justify-between bg-black/30 p-2 rounded-xl border border-white/5">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center font-bold text-sm">Б</div>
                <div>
                    <div class="text-sm font-semibold">Оппонент (Бот)</div>
                    <div class="text-xs text-gray-400">Очки: <span class="text-white font-bold">0</span></div>
                </div>
            </div>
            <!-- Рубашки карт соперника -->
            <div class="flex gap-1">
                <div class="w-6 h-9 bg-red-700 rounded border border-white/20 shadow"></div>
                <div class="w-6 h-9 bg-red-700 rounded border border-white/20 shadow"></div>
                <div class="w-6 h-9 bg-red-700 rounded border border-white/20 shadow"></div>
                <div class="w-6 h-9 bg-red-700 rounded border border-white/20 shadow"></div>
                <div class="w-6 h-9 bg-red-700 rounded border border-white/20 shadow"></div>
                <div class="w-6 h-9 bg-red-700 rounded border border-white/20 shadow"></div>
            </div>
        </div>

        <!-- Центр: Игровое поле -->
        <div class="flex flex-col items-center justify-center my-auto relative py-8">
            <!-- Козырь на кону -->
            <div class="absolute left-2 top-1/2 -translate-y-1/2 flex flex-col items-center bg-black/40 p-2 rounded-xl border border-white/10">
                <span class="text-xs text-gray-400 mb-1">Козырь</span>
                <div class="w-10 h-14 bg-white text-black font-bold rounded flex items-center justify-center text-lg shadow border border-gray-300">
                    ♥
                </div>
            </div>

            <!-- Карты на столе (взятка) -->
            <div class="flex gap-4 justify-center items-center h-28 w-full">
                <!-- Карта бота -->
                <div class="w-16 h-24 bg-white text-black rounded-xl shadow-xl flex flex-col justify-between p-2 font-bold border-2 border-gray-200 transform -rotate-3">
                    <div>9</div>
                    <div class="text-center text-2xl text-red-500">♥</div>
                    <div class="text-right">9</div>
                </div>
                <!-- Твоя карта -->
                <div class="w-16 h-24 bg-white text-black rounded-xl shadow-xl flex flex-col justify-between p-2 font-bold border-2 border-amber-400 transform rotate-3">
                    <div>J</div>
                    <div class="text-center text-2xl text-red-500">♥</div>
                    <div class="text-right">J</div>
                </div>
            </div>
        </div>

        <!-- Низ: Твоя зона -->
        <div class="flex flex-col gap-3">
            <!-- Кнопки выбора (для этапа торгов, пока просто покажем) -->
            <div class="flex gap-2 justify-center">
                <button class="bg-red-600 hover:bg-red-700 text-xs font-bold py-2 px-4 rounded-xl shadow">Пас</button>
                <button class="bg-green-600 hover:bg-green-700 text-xs font-bold py-2 px-4 rounded-xl shadow">Играю</button>
            </div>

            <!-- Твои карты в руке -->
            <div class="flex justify-center items-center gap-1.5 overflow-x-auto pb-2 px-2">
                <!-- Карта 1 -->
                <div class="w-14 h-22 bg-white text-black rounded-lg shadow-md flex flex-col justify-between p-1.5 font-bold border border-gray-300 active:scale-105 transition-transform shrink-0">
                    <div class="text-xs">A</div>
                    <div class="text-center text-xl text-black">♠</div>
                    <div class="text-right text-xs">A</div>
                </div>
                <!-- Карта 2 -->
                <div class="w-14 h-22 bg-white text-black rounded-lg shadow-md flex flex-col justify-between p-1.5 font-bold border border-gray-300 active:scale-105 transition-transform shrink-0">
                    <div class="text-xs text-red-500">10</div>
                    <div class="text-center text-xl text-red-500">♦</div>
                    <div class="text-right text-xs text-red-500">10</div>
                </div>
                <!-- Карта 3 -->
                <div class="w-14 h-22 bg-white text-black rounded-lg shadow-md flex flex-col justify-between p-1.5 font-bold border border-gray-300 active:scale-105 transition-transform shrink-0">
                    <div class="text-xs text-red-500">K</div>
                    <div class="text-center text-xl text-red-500">♥</div>
                    <div class="text-right text-xs text-red-500">K</div>
                </div>
                <!-- Карта 4 -->
                <div class="w-14 h-22 bg-white text-black rounded-lg shadow-md flex flex-col justify-between p-1.5 font-bold border border-gray-300 active:scale-105 transition-transform shrink-0">
                    <div class="text-xs">Q</div>
                    <div class="text-center text-xl text-black">♣</div>
                    <div class="text-right text-xs">Q</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипт переключения -->
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        function startGame() {
            // Плавное переключение экранов
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
