<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Деберц Клуб</title>
    <!-- Подключаем Tailwind CSS и скрипт Телеграма -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Запрещаем выделение текста и прокрутку, чтобы приложение ощущалось как нативное */
        body {
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-[#141e30] to-[#243b55] text-white font-sans min-h-screen flex flex-col justify-between p-5">

    <!-- БЛОК 1: ПРОФИЛЬ ИГРОКА -->
    <div class="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center justify-between backdrop-blur-md shadow-lg">
        <div class="flex items-center gap-3">
            <!-- Аватарка (заглушка) -->
            <div class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center font-bold text-lg text-slate-900 border-2 border-amber-400 shadow-md shadow-amber-500/20">
                М
            </div>
            <div>
                <h2 id="username" class="font-bold text-lg leading-tight">Максим</h2>
                <p class="text-xs text-gray-400">Рейтинг: <span class="text-amber-400 font-semibold">1250 🏆</span></p>
            </div>
        </div>
        <div class="text-right text-xs text-gray-400 bg-black/20 px-3 py-1.5 rounded-xl">
            <div>Побед: <span class="text-green-400 font-bold">42</span></div>
            <div>Игр: <span class="text-gray-300">68</span></div>
        </div>
    </div>

    <!-- БЛОК 2: КНОПКИ ДЕЙСТВИЯ (ЦЕНТР) -->
    <div class="flex flex-col gap-4 my-auto w-full max-w-sm mx-auto">
        
        <!-- Кнопка: Быстрая игра -->
        <button class="w-full bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 active:scale-[0.98] transition-all py-4 px-6 rounded-2xl font-bold text-lg shadow-lg shadow-green-900/30 flex items-center justify-center gap-3 border-b-4 border-green-700">
            <span>🃏</span> Быстрая игра
        </button>

        <!-- Кнопка: Игра с другом -->
        <button class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 active:scale-[0.98] transition-all py-4 px-6 rounded-2xl font-bold text-lg shadow-lg shadow-orange-900/30 flex items-center justify-center gap-3 border-b-4 border-orange-700">
            <span>👥</span> Играть с другом
        </button>

        <!-- Кнопка: Бот -->
        <button class="w-full bg-white/10 hover:bg-white/15 active:scale-[0.98] transition-all py-3.5 px-6 rounded-2xl font-semibold text-base flex items-center justify-center gap-3 border border-white/10">
            <span>🤖</span> Тренировка с ботом
        </button>
    </div>

    <!-- БЛОК 3: ФУТТЕР (НАВИГАЦИЯ) -->
    <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto w-full">
        <button class="bg-slate-800/60 hover:bg-slate-800 border border-slate-700/50 py-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2">
            🏆 Лидеры
        </button>
        <button class="bg-slate-800/60 hover:bg-slate-800 border border-slate-700/50 py-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2">
            📜 Правила
        </button>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение на весь экран

        // Автоматически берем имя игрока из Телеграма, если доступно
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }
    </script>
</body>
</html>
